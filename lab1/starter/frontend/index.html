<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Bob Labs</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Todo App</h1>
            <p class="subtitle">Manage your tasks efficiently</p>
        </header>

        <main>
            <!-- Add Todo Form -->
            <section class="add-todo-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todoTitle" 
                        placeholder="What needs to be done?" 
                        maxlength="200"
                        autocomplete="off"
                    >
                    <button id="addBtn" class="btn btn-primary">
                        <span class="btn-icon">+</span>
                        Add Todo
                    </button>
                </div>
                <textarea 
                    id="todoDescription" 
                    placeholder="Add a description (optional)" 
                    rows="2"
                    maxlength="500"
                ></textarea>
            </section>

            <!-- Filter Buttons -->
            <section class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </section>

            <!-- Todo List -->
            <section class="todo-list-section">
                <div id="todoList" class="todo-list">
                    <!-- Todos will be dynamically inserted here -->
                </div>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">📋</div>
                    <p>No todos yet. Add one to get started!</p>
                </div>
            </section>

            <!-- Stats -->
            <section class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total:</span>
                    <span id="totalCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Active:</span>
                    <span id="activeCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span id="completedCount" class="stat-value">0</span>
                </div>
            </section>
        </main>

        <footer>
            <p>Made with Bob AI 🤖</p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
